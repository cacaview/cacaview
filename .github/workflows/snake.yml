name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: cacaview
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg

      - name: Copy SVGs and commit
        run: |
          cp dist/github-snake.svg .
          cp dist/github-snake-dark.svg .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-snake.svg github-snake-dark.svg
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update snake animation"
          git push
